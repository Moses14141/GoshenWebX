<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password | Goshen Web X Client Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { /* same config as other pages */ };
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="icon" type="image/png" href="../images/goshen_webx_logo.png" />
</head>

<body class="bg-light text-gray-900 font-body overflow-x-hidden">

  <!-- HEADER - SAME AS LOGIN -->
  <header class="fixed top-0 left-0 right-0 z-50 bg-white/95 backdrop-blur-lg border-b border-gray-100">
    <!-- (exact same header code as your login.html - I copied it for you) -->
    <div class="max-w-screen-2xl mx-auto px-6 lg:px-12">
      <div class="flex items-center justify-between h-20">
        <a href="../index.html" class="flex items-center gap-3">
          <img src="../images/logo_goshenwbeX.png" alt="Goshen Web X" class="h-14 w-auto" />
          <div class="font-heading text-3xl font-semibold tracking-tighter text-primary">GOSHEN <span class="text-emerald">WEB X</span></div>
        </a>
        <a href="login.html" class="text-sm font-medium hover:text-emerald">← Back to Login</a>
      </div>
    </div>
  </header>

  <!-- FORGOT PASSWORD SECTION -->
  <div class="flex-1 flex items-center justify-center px-6 py-24 bg-[url('../images/hedro.jpg')] bg-cover bg-center relative mt-20">
    <div class="absolute inset-0 bg-gradient-to-br from-black/70 via-black/60 to-black/70"></div>

    <div class="relative z-10 w-full max-w-md">
      <div class="bg-white rounded-3xl shadow-2xl p-10">
        <div class="text-center mb-8">
          <h1 class="text-4xl font-heading font-bold tracking-tighter text-primary">Forgot password?</h1>
          <p class="text-gray-600 mt-3">No problem. Enter your email and we’ll send you a reset link.</p>
        </div>

        <form class="space-y-6">
          <div>
            <label class="block text-sm font-medium text-gray-700 mb-2">Business Email</label>
            <input type="email" placeholder="you@yourbusiness.com" 
                   class="w-full px-6 py-4 border border-gray-200 rounded-2xl focus:border-emerald outline-none text-lg">
          </div>

          <button type="button" onclick="alert('Reset link sent! Check your email 📧 (This will work with Firebase later)')"
                  class="w-full bg-emerald hover:bg-primary text-white font-semibold py-4 rounded-3xl text-lg transition-all">
            Send Reset Link
          </button>
        </form>

        <div class="text-center mt-8">
          <a href="login.html" class="text-emerald font-semibold hover:underline">← Back to Login</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Terms -->
  <div class="text-center text-xs text-gray-500 py-6">
    By using this, you agree to our <a href="../terms.html" target="_blank" class="text-emerald">Terms of Service</a>
  </div>
</body>
</html>
