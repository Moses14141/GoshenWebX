<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Account | Goshen Web X Client Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      content: [],
      theme: {
        extend: {
          fontFamily: {
            heading: ['Poppins', 'sans-serif'],
            body: ['Plus Jakarta Sans', 'sans-serif'],
          },
          colors: {
            primary: '#14532d',
            emerald: '#10b981',
            'emerald-light': '#34d399',
            light: '#f8faf5',
            soft: '#f1f5f0',
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="icon" type="image/png" href="../images/goshen_webx_logo.png" />
</head>

<body class="bg-light text-gray-900 font-body overflow-x-hidden">

  <!-- HEADER - SAME AS DASHBOARD -->
  <header class="fixed top-0 left-0 right-0 z-50 bg-white/95 backdrop-blur-lg border-b border-gray-100">
    <div class="max-w-screen-2xl mx-auto px-6 lg:px-12">
      <div class="flex items-center justify-between h-20">
        <a href="../index.html" class="flex items-center gap-3">
          <img src="../images/logo_goshenwbeX.png" alt="Goshen Web X" class="h-14 w-auto" />
          <div class="font-heading text-3xl font-semibold tracking-tighter text-primary">GOSHEN <span class="text-emerald">WEB X</span></div>
        </a>

        <nav class="hidden lg:flex items-center gap-8 text-sm font-medium">
          <a href="dashboard.html" class="hover:text-primary">Dashboard</a>
          <a href="my-sites.html" class="hover:text-primary">My Sites</a>
          <a href="templates.html" class="hover:text-primary">Templates</a>
        </nav>

        <div class="hidden lg:flex items-center gap-6">
          <div class="flex items-center text-sm font-medium">
            <a href="#" class="text-emerald font-semibold px-2">EN</a>
            <span class="text-gray-400 mx-1">/</span>
            <a href="../index-fr.html" class="hover:text-primary transition-colors px-2">FR</a>
          </div>
          <a href="dashboard.html" class="flex items-center gap-2 bg-emerald hover:bg-primary text-white font-semibold px-6 py-3 rounded-3xl transition-all">
            ← Back to Dashboard
          </a>
        </div>

        <button id="hamburger" class="lg:hidden text-4xl p-4 -mr-3 text-primary">
          <i class="fas fa-bars"></i>
        </button>
      </div>
    </div>
  </header>

  <!-- Backdrop + Drawer -->
  <div id="backdrop" class="hidden fixed inset-0 bg-black/60 z-[9998]"></div>
  <div id="side-menu" class="fixed top-0 bottom-0 right-0 w-80 bg-white shadow-2xl translate-x-full transition-transform duration-300 z-[9999] overflow-y-auto">
    <div class="p-6">
      <button id="close-menu" class="float-right text-4xl text-gray-400 hover:text-primary">✕</button>
      <nav class="flex flex-col text-2xl font-medium mt-12 text-gray-800">
        <a href="dashboard.html" class="py-5 border-b border-gray-100">Dashboard</a>
        <a href="my-sites.html" class="py-5 border-b border-gray-100">My Sites</a>
        <a href="templates.html" class="py-5 border-b border-gray-100">Templates</a>
        <a href="../contact.html" class="py-5 border-b border-gray-100">Contact Support</a>
      </nav>
    </div>
  </div>

  <!-- ACCOUNT CONTENT -->
  <div class="pt-20 min-h-screen bg-soft">
    <div class="max-w-screen-2xl mx-auto px-6 lg:px-12 py-12">
      <div class="max-w-2xl mx-auto">
        <h1 class="text-5xl font-heading font-bold tracking-tighter text-primary mb-2">My Account</h1>
        <p class="text-xl text-gray-600">Manage your profile and security</p>

        <div class="mt-12 bg-white rounded-3xl shadow p-10">
          
          <!-- Profile Info -->
          <div class="border-b pb-10">
            <h3 class="font-semibold text-lg mb-6">Profile Information</h3>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
                <input type="text" value="Moïse Bisimwa Laurent" 
                       class="w-full px-6 py-4 border border-gray-200 rounded-2xl focus:border-emerald outline-none">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Business Email</label>
                <input type="email" value="moise@goshenwebx.io" readonly
                       class="w-full px-6 py-4 border border-gray-200 rounded-2xl bg-gray-50">
              </div>
            </div>
            <button onclick="alert('Profile updated! ✅')" 
                    class="mt-6 bg-emerald hover:bg-primary text-white px-8 py-3 rounded-3xl font-semibold">
              Save Profile Changes
            </button>
          </div>

          <!-- Change Password -->
          <div class="pt-10">
            <h3 class="font-semibold text-lg mb-6">Change Password</h3>
            <div class="space-y-6">
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Current Password</label>
                <input type="password" placeholder="••••••••" 
                       class="w-full px-6 py-4 border border-gray-200 rounded-2xl focus:border-emerald outline-none">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">New Password</label>
                <input type="password" placeholder="••••••••" 
                       class="w-full px-6 py-4 border border-gray-200 rounded-2xl focus:border-emerald outline-none">
              </div>
              <div>
                <label class="block text-sm font-medium text-gray-700 mb-2">Confirm New Password</label>
                <input type="password" placeholder="••••••••" 
                       class="w-full px-6 py-4 border border-gray-200 rounded-2xl focus:border-emerald outline-none">
              </div>
              <button onclick="alert('Password changed successfully! 🔒 (Firebase will handle this later)')" 
                      class="w-full bg-emerald hover:bg-primary text-white py-4 rounded-3xl font-semibold">
                Update Password
              </button>
            </div>
          </div>

          <!-- Log Out -->
          <div class="mt-12 pt-10 border-t border-red-100">
            <button onclick="if(confirm('Log out?')) window.location='login.html'" 
                    class="w-full bg-red-50 hover:bg-red-100 text-red-600 py-4 rounded-3xl font-semibold flex items-center justify-center gap-2">
              <i class="fas fa-sign-out-alt"></i> Log Out
            </button>
          </div>
        </div>

        <!-- Terms -->
        <div class="mt-12 text-center text-xs text-gray-500">
          By using your account, you agree to our 
          <a href="../terms.html" target="_blank" class="text-emerald hover:underline">Terms of Service</a> 
          and 
          <a href="../privacy-policy.html" target="_blank" class="text-emerald hover:underline">Privacy Policy</a>.
        </div>
      </div>
    </div>
  </div>

  <!-- HEADER SCRIPTS -->
  <script>
    const hamburger = document.getElementById('hamburger');
    const sideMenu = document.getElementById('side-menu');
    const backdrop = document.getElementById('backdrop');
    const closeBtn = document.getElementById('close-menu');

    hamburger.addEventListener('click', () => {
      sideMenu.classList.remove('translate-x-full');
      backdrop.classList.remove('hidden');
    });

    function closeMenu() {
      sideMenu.classList.add('translate-x-full');
      backdrop.classList.add('hidden');
    }

    closeBtn.addEventListener('click', closeMenu);
    backdrop.addEventListener('click', closeMenu);
  </script>
</body>
</html>
